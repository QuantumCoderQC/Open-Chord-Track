<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Chord Track | D Major Detector</title>
    
    <script src="https://cdn.jsdelivr.net/npm/essentia.js@0.1.3/dist/essentia.js-core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/essentia.js@0.1.3/dist/essentia-wasm.web.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0e0e0e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #score-container {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #333;
            text-align: center;
            width: 320px;
            transition: border-color 0.3s;
        }

        #score-text { font-size: 4rem; font-weight: bold; margin: 10px 0; color: #00f2ff; }
        #status-text { font-size: 1.2rem; color: #888; margin-bottom: 20px; }

        .btn {
            background: #00f2ff;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        #visualizer {
            display: flex;
            gap: 4px;
            margin-top: 20px;
            height: 60px;
            align-items: flex-end;
            justify-content: center;
        }

        .bin { width: 14px; background: #333; border-radius: 2px 2px 0 0; min-height: 2px; }
        .bin.active { background: #00f2ff; box-shadow: 0 0 10px #00f2ff; }
        
        .chord-indicator { color: #00f2ff; font-weight: bold; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 style="color: #00f2ff; letter-spacing: 2px;">OPEN CHORD TRACK</h1>

    <div id="score-container">
        <div id="status-text">Initializing Engine...</div>
        <button id="startBtn" class="btn" disabled>Wait...</button>
        
        <div id="mainUI" style="display: none;">
            <div id="score-text">0.00</div>
            <div id="detection-msg" class="chord-indicator">★ D MAJOR ★</div>
            <div id="visualizer">
                <div class="bin"></div><div class="bin"></div><div class="bin"></div>
                <div class="bin"></div><div class="bin"></div><div class="bin"></div>
                <div class="bin"></div><div class="bin"></div><div class="bin"></div>
                <div class="bin"></div><div class="bin"></div><div class="bin"></div>
            </div>
        </div>
    </div>

    <script>
        let essentia;
        let audioCtx;
        
        // Target: D (idx 2), F# (idx 6), A (idx 9)
        const D_MAJOR_TEMPLATE = [0, 0, 1.0, 0, 0, 0, 0.8, 0, 0, 0.9, 0, 0];
        const ENERGY_THRESHOLD = 0.04;
        const MATCH_THRESHOLD = 0.82;

        async function init() {
            const status = document.getElementById('status-text');
            const btn = document.getElementById('startBtn');

            // Find the WASM backend dynamically
            const wasmBackend = window.EssentiaWASMv1 || window.EssentiaWASM || (window.EssentiaJS && window.EssentiaJS.EssentiaWASM);

            if (wasmBackend && window.Essentia) {
                try {
                    essentia = new Essentia(wasmBackend);
                    status.innerText = "Engine Ready";
                    btn.innerText = "Start Listening";
                    btn.disabled = false;
                    btn.addEventListener('click', startAudio);
                } catch (e) {
                    status.innerText = "Error initializing WASM";
                    console.error(e);
                }
            } else {
                status.innerText = "Library not found. Retrying...";
                setTimeout(init, 500); // Check again in 500ms
            }
        }

        async function startAudio() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status-text').innerText = "Play a D Major Chord";
            document.getElementById('mainUI').style.display = 'block';

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            
            // Note: ScriptProcessor is deprecated but most compatible for simple hobby projects
            const processor = audioCtx.createScriptProcessor(8192, 1, 1);
            source.connect(processor);
            processor.connect(audioCtx.destination);

            processor.onaudioprocess = (e) => {
                const inputData = e.inputBuffer.getChannelData(0);
                const vector = essentia.arrayToVector(inputData);
                const energy = essentia.RMS(vector);

                if (energy < ENERGY_THRESHOLD) {
                    updateUI(0, [], false);
                    return;
                }

                // HPCP extraction (12-bin chroma)
                const hpcp = essentia.HPCP(vector).vectorToArray();
                
                // Enhancement: Square the values to reduce noise bleed (Python logic)
                const cleanChroma = hpcp.map(v => Math.pow(v, 2));
                const score = calculateSimilarity(cleanChroma, D_MAJOR_TEMPLATE);

                updateUI(score, cleanChroma, score > MATCH_THRESHOLD);
            };
        }

        function calculateSimilarity(v1, v2) {
            let dot = 0, mag1 = 0, mag2 = 0;
            for (let i = 0; i < 12; i++) {
                dot += v1[i] * v2[i];
                mag1 += v1[i] * v1[i];
                mag2 += v2[i] * v2[i];
            }
            return dot / (Math.sqrt(mag1) * Math.sqrt(mag2) + 1e-9);
        }

        function updateUI(score, chroma, isMatch) {
            document.getElementById('score-text').innerText = score.toFixed(2);
            const msg = document.getElementById('detection-msg');
            msg.style.display = isMatch ? 'block' : 'none';
            
            const container = document.getElementById('score-container');
            container.style.borderColor = isMatch ? '#00f2ff' : '#333';

            const bins = document.querySelectorAll('.bin');
            if (chroma.length > 0) {
                const max = Math.max(...chroma);
                chroma.forEach((val, i) => {
                    const height = (val / (max + 0.001)) * 60;
                    bins[i].style.height = `${Math.max(2, height)}px`;
                    bins[i].className = (val/max > 0.4) ? "bin active" : "bin";
                });
            }
        }

        // Start initialization when page loads
        window.onload = init;
    </script>
</body>
</html>
