<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Chord Track</title>
    
    <script src="https://cdn.jsdelivr.net/npm/essentia.js@0.1.3/dist/essentia.js-core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/essentia.js@0.1.3/dist/essentia-wasm.web.js"></script>

    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding-top: 50px; }
        #container { background: #1e1e1e; padding: 30px; border-radius: 15px; display: inline-block; border: 2px solid #333; }
        .btn { background: #00f2ff; color: black; padding: 15px 30px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        #score { font-size: 3rem; color: #00f2ff; margin: 20px 0; }
        #visualizer { display: flex; gap: 4px; justify-content: center; height: 50px; align-items: flex-end; }
        .bin { width: 10px; background: #333; min-height: 2px; }
        .bin.active { background: #00f2ff; }
    </style>
</head>
<body>

    <h1>OPEN CHORD TRACK</h1>
    <div id="container">
        <div id="status">Loading Engine...</div>
        <button id="startBtn" class="btn" disabled>Wait...</button>
        
        <div id="ui" style="display:none;">
            <div id="score">0.00</div>
            <div id="visualizer">
                <div class="bin"></div><div class="bin"></div><div class="bin"></div>
                <div class="bin"></div><div class="bin"></div><div class="bin"></div>
                <div class="bin"></div><div class="bin"></div><div class="bin"></div>
                <div class="bin"></div><div class="bin"></div><div class="bin"></div>
            </div>
        </div>
    </div>

    <script>
        let essentia;
        let audioCtx;
        
        // D Major Template: [C, C#, D, D#, E, F, F#, G, G#, A, A#, B]
        const D_MAJOR = [0, 0, 1.0, 0, 0, 0, 0.8, 0, 0, 0.9, 0, 0];

        function init() {
            const btn = document.getElementById('startBtn');
            const status = document.getElementById('status');

            // Find the Constructor (Class) and the Backend (WASM)
            // Different versions use different global names; we check them all.
            const EssentiaClass = window.Essentia; 
            const wasmBackend = window.EssentiaWASMv1 || window.EssentiaWASM;

            if (EssentiaClass && wasmBackend) {
                try {
                    // This is the line that was failing for you.
                    // We ensure we are calling 'new' on the Class, passing the WASM object.
                    essentia = new EssentiaClass(wasmBackend);
                    
                    status.innerText = "Engine Ready";
                    btn.innerText = "Start Strumming";
                    btn.disabled = false;
                    btn.onclick = startAudio;
                } catch (e) {
                    status.innerText = "Init Error: " + e.message;
                }
            } else {
                status.innerText = "Waiting for scripts...";
                setTimeout(init, 500);
            }
        }

        async function startAudio() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('status').innerText = "Target: D Major Chord";

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            const processor = audioCtx.createScriptProcessor(8192, 1, 1);

            source.connect(processor);
            processor.connect(audioCtx.destination);

            processor.onaudioprocess = (e) => {
                const input = e.inputBuffer.getChannelData(0);
                const vector = essentia.arrayToVector(input);

                if (essentia.RMS(vector) > 0.04) {
                    const hpcp = essentia.HPCP(vector).vectorToArray();
                    const clean = hpcp.map(v => Math.pow(v, 2));
                    const score = calculateSimilarity(clean, D_MAJOR);
                    updateUI(score, clean);
                } else {
                    updateUI(0, []);
                }
            };
        }

        function calculateSimilarity(v1, v2) {
            let dot = 0, m1 = 0, m2 = 0;
            for (let i = 0; i < 12; i++) {
                dot += v1[i] * v2[i];
                m1 += v1[i] * v1[i];
                m2 += v2[i] * v2[i];
            }
            return dot / (Math.sqrt(m1) * Math.sqrt(m2) + 1e-9);
        }

        function updateUI(score, chroma) {
            document.getElementById('score').innerText = score.toFixed(2);
            const bins = document.querySelectorAll('.bin');
            if (chroma.length) {
                const max = Math.max(...chroma);
                chroma.forEach((v, i) => {
                    bins[i].style.height = (v/max * 50) + 'px';
                    bins[i].className = (v/max > 0.4) ? 'bin active' : 'bin';
                });
            }
        }

        window.onload = init;
    </script>
</body>
</html>
